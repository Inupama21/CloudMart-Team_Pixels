name: CloudMart CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
      - 'ci/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::537090271991:role/github-actions-cloudmart-deploy-role
  CLUSTER_NAME: cloudmart-prod-eks

jobs:

# -----------------------------
# 1. LINT + TEST (CI)
# -----------------------------
  ci:
    name: CI - Lint & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, user-service, product-service, order-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./services/${{ matrix.service }}/Dockerfile
          ignore: DL3018,DL3007

      - name: Install Node.js Dependencies
        if: matrix.service == 'frontend' || matrix.service == 'order-service' || matrix.service == 'notification-service'
        run: |
          cd services/${{ matrix.service }}
          npm install

      - name: Test Node.js Service
        if: matrix.service == 'frontend' || matrix.service == 'order-service' || matrix.service == 'notification-service'
        run: |
          cd services/${{ matrix.service }}
          CI=true npm test

      - name: Set up Python
        if: matrix.service == 'product-service' || matrix.service == 'user-service'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        if: matrix.service == 'product-service' || matrix.service == 'user-service'
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install flake8

      - name: Lint Python Service
        if: matrix.service == 'product-service' || matrix.service == 'user-service'
        run: |
          cd services/${{ matrix.service }}
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test Python Service
        if: matrix.service == 'product-service' || matrix.service == 'user-service'
        run: |
          cd services/${{ matrix.service }}
          python -m unittest discover -s tests

# -----------------------------
# 2. BUILD + SCAN + PUSH
# -----------------------------
  build:
    name: Build & Push Images
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, user-service, product-service, order-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: AWS Login (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image for Scan
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          load: true
          tags: local-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'local-image:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha

# -----------------------------
# 3. MANIFEST VALIDATION
# -----------------------------
  validate:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L -s -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz

      - name: Validate Manifests
        run: ./kubeconform -summary -ignore-missing-schemas k8s/

# -----------------------------
# 4. DEPLOY TO STAGING
# -----------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: [build, validate]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/ci/cd-maheepa'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy All Services to Staging
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="sha-${{ github.sha }}"
          NAMESPACE="cloudmart-staging"
          SERVICES="frontend user-service product-service order-service notification-service"

          # Apply namespace + configmap first (with namespace substitution)
          sed "s|namespace: cloudmart-prod|namespace: $NAMESPACE|g" k8s/namespace.yaml | kubectl apply -f -
          sed "s|namespace: cloudmart-prod|namespace: $NAMESPACE|g" k8s/configmap.yaml | kubectl apply -f -

          for SERVICE in $SERVICES; do
            MANIFEST_FILE="k8s/$SERVICE.yaml"
            echo "Deploying $SERVICE to $NAMESPACE..."
            sed \
              -e "s|namespace: cloudmart-prod|namespace: $NAMESPACE|g" \
              -e "s|image: .*/$SERVICE:.*|image: $REGISTRY/$SERVICE:$IMAGE_TAG|g" \
              "$MANIFEST_FILE" | kubectl apply -f -
          done

      - name: Wait for Rollouts (Staging)
        run: |
          NAMESPACE="cloudmart-staging"
          for SERVICE in frontend user-service product-service order-service notification-service; do
            echo "Waiting for $SERVICE rollout..."
            kubectl rollout status deployment/$SERVICE -n $NAMESPACE --timeout=5m
          done

      - name: Post-Deploy Smoke Tests (Staging)
        run: |
          NAMESPACE="cloudmart-staging"
          declare -A SERVICE_PORTS=( [frontend]="80" [product-service]="8001" [order-service]="8002" [user-service]="8003" [notification-service]="8004" )
          declare -A SERVICE_PATHS=( [frontend]="/health" [product-service]="/ready" [order-service]="/ready" [user-service]="/ready" [notification-service]="/ready" )

          for SERVICE in "${!SERVICE_PORTS[@]}"; do
            PORT="${SERVICE_PORTS[$SERVICE]}"
            PATH_URL="${SERVICE_PATHS[$SERVICE]}"
            echo "Smoke testing $SERVICE on port $PORT at $PATH_URL..."
            kubectl port-forward svc/$SERVICE 8888:$PORT -n $NAMESPACE &
            PF_PID=$!
            sleep 5
            if curl -f -s http://localhost:8888$PATH_URL; then
              echo "$SERVICE smoke test passed"
            else
              echo "$SERVICE smoke test FAILED"
              kill $PF_PID
              exit 1
            fi
            kill $PF_PID
            sleep 2
          done

# -----------------------------
# 5. MANUAL APPROVAL FOR PROD
# -----------------------------
  approve:
    name: Approve Production
    needs: [build, validate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deployment approved by reviewer"

# -----------------------------
# 6. DEPLOY TO PROD
# -----------------------------
  deploy-prod:
    name: Deploy to Production
    needs: approve
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy All Services to Production
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="sha-${{ github.sha }}"
          NAMESPACE="cloudmart-prod"

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

          for SERVICE in frontend user-service order-service notification-service; do
            MANIFEST_FILE="k8s/$SERVICE.yaml"
            echo "Deploying $SERVICE to $NAMESPACE..."
            sed "s|image: .*/$SERVICE:.*|image: $REGISTRY/$SERVICE:$IMAGE_TAG|g" \
              "$MANIFEST_FILE" | kubectl apply -f -
          done

          # product-service: use canary if Argo Rollouts is installed
          if kubectl get crd rollouts.argoproj.io > /dev/null 2>&1; then
            echo "Argo Rollouts detected — applying canary rollout for product-service..."
            sed "s|image: .*/product-service:.*|image: $REGISTRY/product-service:$IMAGE_TAG|g" \
              k8s/product-service-canary.yaml | kubectl apply -f -

            curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
            chmod +x ./kubectl-argo-rollouts-linux-amd64
            sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

            kubectl argo rollouts status product-service -n $NAMESPACE --timeout 10m
          else
            echo "Argo Rollouts not found — using standard rolling deployment for product-service..."
            sed "s|image: .*/product-service:.*|image: $REGISTRY/product-service:$IMAGE_TAG|g" \
              k8s/product-service.yaml | kubectl apply -f -
          fi

      - name: Wait for Rollouts (Production)
        run: |
          NAMESPACE="cloudmart-prod"
          for SERVICE in frontend user-service order-service notification-service; do
            echo "Waiting for $SERVICE rollout..."
            kubectl rollout status deployment/$SERVICE -n $NAMESPACE --timeout=5m
          done

      - name: Post-Deploy Smoke Tests (Production)
        run: |
          NAMESPACE="cloudmart-prod"
          declare -A SERVICE_PORTS=( [frontend]="80" [product-service]="8001" [order-service]="8002" [user-service]="8003" [notification-service]="8004" )
          declare -A SERVICE_PATHS=( [frontend]="/health" [product-service]="/ready" [order-service]="/ready" [user-service]="/ready" [notification-service]="/ready" )

          for SERVICE in "${!SERVICE_PORTS[@]}"; do
            PORT="${SERVICE_PORTS[$SERVICE]}"
            PATH_URL="${SERVICE_PATHS[$SERVICE]}"
            echo "Smoke testing $SERVICE..."
            kubectl port-forward svc/$SERVICE 8888:$PORT -n $NAMESPACE &
            PF_PID=$!
            sleep 5
            if curl -f -s http://localhost:8888$PATH_URL; then
              echo "$SERVICE passed"
            else
              echo "$SERVICE FAILED"
              kill $PF_PID
              exit 1
            fi
            kill $PF_PID
            sleep 2
          done
