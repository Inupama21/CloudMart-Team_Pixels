apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: product-service
  namespace: cloudmart-prod
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: <YOUR-REGISTRY>/product-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: PORT
          value: "8001"
        - name: STORE_BACKEND
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: PRODUCT_STORE_BACKEND
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30
  strategy:
    canary:
      stableService: product-service
      canaryService: product-service-canary
      analysis:
        templates:
          - templateName: product-error-rate
        args:
          - name: service-name
            value: product-service-canary
      steps:
        - setWeight: 10
        - pause: { duration: 1m }
        - setWeight: 50
        - pause: { duration: 1m }
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: cloudmart-prod
spec:
  selector:
    app: product-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: product-service-canary
  namespace: cloudmart-prod
spec:
  selector:
    app: product-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: cloudmart-prod
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: product-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: product-error-rate
  namespace: cloudmart-prod
spec:
  metrics:
  - name: error-rate
    interval: 10s
    successCondition: result[0] < 0.01
    failureLimit: 1
    provider:
      prometheus:
        address: http://prometheus-operated.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(http_requests_total{status=~"5.*",app="product-service"}[1m]))
          /
          sum(rate(http_requests_total{app="product-service"}[1m]))
