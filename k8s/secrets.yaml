# Kubernetes Secrets for sensitive configuration
# IMPORTANT: DO NOT COMMIT REAL SECRETS TO GIT
# This is a template. Real values should be injected via CI/CD,
# or mapped from AWS Secrets Manager using the CSI Driver (Member 5).
apiVersion: v1
kind: Secret
metadata:
  name: cloudmart-secrets
  namespace: cloudmart-prod
type: Opaque
stringData:
  # Base64-encoded strings NOT required when using stringData
  JWT_SECRET: "your-super-secret-jwt-key"
  
  # RDS PostgreSQL (user-service)
  DB_HOST: "cloudmart-users-db-dev.xxxxx.us-east-1.rds.amazonaws.com"
  DB_USER: "cloudmart"
  DB_PASSWORD: "your-db-password"
  
  # SQS Queue URL (order-service, notification-service)
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/123456789012/cloudmart-order-events-dev"
