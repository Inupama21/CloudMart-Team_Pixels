# ConfigMap for non-sensitive configuration
# Sensitive values (DB passwords, JWT secrets) should go in Kubernetes Secrets
# injected from your cloud provider's secret management service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudmart-config
  namespace: cloudmart-prod
data:
  USER_DB_BACKEND: postgres
  PRODUCT_DB_BACKEND: postgres
  ORDER_DB_BACKEND: postgres

  DB_NAME: cloudmart
  DB_PORT: "5432"
  DB_SSLMODE: disable
  AWS_REGION: 'us-east-1'
  DYNAMODB_TABLE: cloudmart-orders
  SQS_QUEUE_URL: URL
  # Product Service
  PRODUCT_STORE_BACKEND: "dynamodb"
  DYNAMODB_TABLE: "cloudmart-products-dev"
  AWS_REGION: "us-east-1"

  # Order Service
  PRODUCT_SERVICE_URL: "http://product-service:8001"
  ORDER_QUEUE_BACKEND: "sqs"

  # Notification Service
  ORDER_SERVICE_URL: "http://order-service:8002"
  NOTIFICATION_QUEUE_BACKEND: "sqs"
  NOTIFICATION_EMAIL_BACKEND: "console"
  NOTIFICATION_POLL_INTERVAL: "5000"

  # User Service
  USER_DB_BACKEND: "postgres"
  DB_PORT: "5432"
  DB_NAME: "cloudmart"
  DB_SSLMODE: "require"
