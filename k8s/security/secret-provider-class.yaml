# CI replaces SECRET_NAME and the namespace before applying this file.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cloudmart-application-secret
  namespace: cloudmart-prod
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "SECRET_NAME"
        objectType: "secretsmanager"
        jmesPath:
          - path: db_host
            objectAlias: db-host
          - path: db_user
            objectAlias: db-user
          - path: db_password
            objectAlias: db-password
          - path: jwt_secret
            objectAlias: jwt-secret
  secretObjects:
    - secretName: cloudmart-secrets
      type: Opaque
      data:
        - objectName: db-host
          key: DB_HOST
        - objectName: db-user
          key: DB_USER
        - objectName: db-password
          key: DB_PASSWORD
        - objectName: jwt-secret
          key: JWT_SECRET
