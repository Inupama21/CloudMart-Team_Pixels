apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: cloudmart-prod
  labels:
    app: notification-service
spec:
  replicas: 1    # Single replica is fine — it's a queue consumer
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: notification-service-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: notification-service
        image: 537090271991.dkr.ecr.us-east-1.amazonaws.com/notification-service:latest
        ports:
        - containerPort: 8004
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1000
        env:
        - name: PORT
          value: "8004"
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: ORDER_SERVICE_URL
        - name: QUEUE_BACKEND
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: NOTIFICATION_QUEUE_BACKEND
        - name: EMAIL_BACKEND
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: NOTIFICATION_EMAIL_BACKEND
        - name: POLL_INTERVAL_MS
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: NOTIFICATION_POLL_INTERVAL
        - name: SQS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: SQS_QUEUE_URL
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: AWS_REGION
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: cloudmart-prod
spec:
  selector:
    app: notification-service
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
